services:
  - type: web
    name: employee-directory-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SEED_SAMPLE_DATA
        value: "true"
