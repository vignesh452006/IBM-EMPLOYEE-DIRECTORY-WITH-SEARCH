<!--
Title: Employee Directory
How to use: Save this file as employee-directory.html, open in VS Code and use Live Server or open directly in a browser.
You can edit the `PAGE_TITLE` constant below to change the page title/header.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee Directory</title>
  <style>
    :root{--accent:#2b6cb0;--muted:#6b7280;--bg:#f7fafc}
    body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg); color:#0f172a; margin:0; padding:24px}
    .container{max-width:1100px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    h1{font-size:22px;margin:0}
    .controls{display:flex;gap:10px;flex-wrap:wrap}
    .search{padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;min-width:260px}
    .select, .btn{padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;background:white;cursor:pointer}
    .btn{background:var(--accent);color:white;border:none}
    .card{background:white;border-radius:12px;padding:14px;box-shadow:0 6px 18px rgba(12,18,33,0.06)}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eef2f7}
    th{font-size:13px;color:var(--muted)}
    tbody tr:hover{background:rgba(43,108,176,0.04)}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;background:#eef2ff;color:var(--accent)}
    .small{font-size:13px;color:var(--muted)}
    .footer{margin-top:12px;display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px}
    @media (max-width:720px){.controls{flex-direction:column;align-items:stretch}.search{width:100%}}
    /* highlight matched text */
    mark{background:yellow;color:#111;padding:0 2px;border-radius:2px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1 id="pageTitle">Employee Directory</h1>
        <div class="small">Search employees by name, department, role or email</div>
      </div>
      <div class="controls">
        <input id="searchInput" class="search" placeholder="Search employees... (name, dept, role, email)" />
        <select id="deptFilter" class="select">
          <option value="">All Departments</option>
        </select>
        <select id="sortBy" class="select">
          <option value="name">Sort: Name (A → Z)</option>
          <option value="dept">Sort: Department</option>
          <option value="role">Sort: Role</option>
        </select>
        <button id="addBtn" class="btn">+ Add</button>
      </div>
    </header>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Role</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- rows inserted by JS -->
        </tbody>
      </table>

      <div class="footer">
        <div id="countText">0 employees</div>
        <div>
          <button id="exportCsv" class="select">Export CSV</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Simple modal for adding employee -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(2,6,23,0.45);align-items:center;justify-content:center;">
    <div style="background:white;padding:18px;border-radius:12px;min-width:320px;max-width:420px;box-shadow:0 10px 30px rgba(2,6,23,0.3)">
      <h3 style="margin-top:0">Add employee</h3>
      <div style="display:grid;gap:8px">
        <input id="fName" placeholder="Full name" style="padding:8px;border:1px solid #e6e8eb;border-radius:8px" />
        <input id="fDept" placeholder="Department" style="padding:8px;border:1px solid #e6e8eb;border-radius:8px" />
        <input id="fRole" placeholder="Role" style="padding:8px;border:1px solid #e6e8eb;border-radius:8px" />
        <input id="fEmail" placeholder="Email" style="padding:8px;border:1px solid #e6e8eb;border-radius:8px" />
        <input id="fPhone" placeholder="Phone" style="padding:8px;border:1px solid #e6e8eb;border-radius:8px" />
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
          <button id="cancelBtn" class="select">Cancel</button>
          <button id="saveBtn" class="btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Change this variable to update the page title / header quickly
    const PAGE_TITLE = 'Employee Directory';
    document.title = PAGE_TITLE;
    document.getElementById('pageTitle').textContent = PAGE_TITLE;

    // Sample employee data (you can load from server in real app)
    let employees = [
      {id:1, name:'Asha Kumar', dept:'Engineering', role:'Frontend Engineer', email:'asha.kumar@example.com', phone:'+91 98765 43210'},
      {id:2, name:'Ravi Sharma', dept:'Engineering', role:'Backend Engineer', email:'ravi.sharma@example.com', phone:'+91 91234 56789'},
      {id:3, name:'Meera Iyer', dept:'HR', role:'HR Manager', email:'meera.iyer@example.com', phone:'+91 99887 66554'},
      {id:4, name:'Karan Patel', dept:'Design', role:'UX Designer', email:'karan.patel@example.com', phone:'+91 90123 45678'},
      {id:5, name:'Sana Khan', dept:'Sales', role:'Account Executive', email:'sana.khan@example.com', phone:'+91 90909 90909'}
    ];

    // DOM refs
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const deptFilter = document.getElementById('deptFilter');
    const sortBy = document.getElementById('sortBy');
    const countText = document.getElementById('countText');
    const exportCsv = document.getElementById('exportCsv');

    // Modal refs
    const modal = document.getElementById('modal');
    const addBtn = document.getElementById('addBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');
    const fName = document.getElementById('fName');
    const fDept = document.getElementById('fDept');
    const fRole = document.getElementById('fRole');
    const fEmail = document.getElementById('fEmail');
    const fPhone = document.getElementById('fPhone');

    function uniqueDepartments(list){
      const s = new Set(list.map(e => e.dept));
      return Array.from(s).sort();
    }

    function populateDeptFilter(){
      const depts = uniqueDepartments(employees);
      deptFilter.innerHTML = '<option value="">All Departments</option>' + depts.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
    }

    function escapeHtml(s){
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function highlight(text, q){
      if(!q) return escapeHtml(text);
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','ig');
      return escapeHtml(text).replace(re, '<mark>$1</mark>');
    }

    function renderTable(){
      const q = searchInput.value.trim();
      const dept = deptFilter.value;
      let list = employees.slice();

      // filter
      if(dept) list = list.filter(e => (e.dept||'').toLowerCase() === dept.toLowerCase());
      if(q) {
        const ql = q.toLowerCase();
        list = list.filter(e => [e.name,e.dept,e.role,e.email].some(f => (f||'').toLowerCase().includes(ql)));
      }

      // sort
      const s = sortBy.value;
      list.sort((a,b) => (a[s] || '').localeCompare(b[s] || ''));

      // render rows
      tableBody.innerHTML = list.map(e => `
        <tr data-id="${e.id}" style="cursor:default">
          <td>${highlight(e.name, q)}</td>
          <td>${highlight(e.dept, q)}</td>
          <td>${highlight(e.role, q)}</td>
          <td>${highlight(e.email, q)}</td>
          <td>${highlight(e.phone, q)}</td>
        </tr>
      `).join('');

      countText.textContent = list.length + (list.length === 1 ? ' employee' : ' employees');
    }

    // export CSV
    function toCsv(arr){
      const header = ['Name','Department','Role','Email','Phone'];
      const rows = arr.map(e => [e.name,e.dept,e.role,e.email,e.phone]);
      return [header, ...rows].map(r => r.map(cell => '"' + String(cell).replace(/"/g,'""') + '"').join(',')).join('\n');
    }

    exportCsv.addEventListener('click', ()=>{
      const q = searchInput.value.trim();
      const dept = deptFilter.value;
      let list = employees.slice();
      if(dept) list = list.filter(e => (e.dept||'').toLowerCase() === dept.toLowerCase());
      if(q) { const ql=q.toLowerCase(); list = list.filter(e => [e.name,e.dept,e.role,e.email].some(f=> (f||'').toLowerCase().includes(ql))); }
      const csv = toCsv(list);
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'employees.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    });

    // modal handlers
    addBtn.addEventListener('click', ()=>{ modal.style.display = 'flex'; clearModal(); fName.focus(); });
    cancelBtn.addEventListener('click', ()=>{ modal.style.display = 'none'; });
    saveBtn.addEventListener('click', ()=>{
      const name = fName.value.trim(); if(!name){ alert('Name required'); fName.focus(); return; }
      const newEmp = { id: Date.now(), name, dept: fDept.value.trim()||'General', role: fRole.value.trim()||'Staff', email: fEmail.value.trim()||'', phone: fPhone.value.trim()||'' };
      employees.push(newEmp);
      populateDeptFilter(); renderTable(); modal.style.display='none';
    });

    function clearModal(){ fName.value=''; fDept.value=''; fRole.value=''; fEmail.value=''; fPhone.value=''; }

    // wire search/filter/sort events with debouncing
    let debounce;
    [searchInput, deptFilter, sortBy].forEach(el=> el.addEventListener('input', ()=>{ clearTimeout(debounce); debounce = setTimeout(renderTable, 150); }));

    // initial render
    populateDeptFilter(); renderTable();

    // small UX: click a row to copy email
    tableBody.addEventListener('click', (ev)=>{
      const tr = ev.target.closest('tr'); if(!tr) return; const id = +tr.dataset.id; const emp = employees.find(e=>e.id===id); if(!emp) return; navigator.clipboard?.writeText(emp.email || '')
        .then(()=> alert('Email copied to clipboard: ' + (emp.email || '')))
        .catch(()=> alert('Email: ' + (emp.email || '')));
    });

  </script>
</body>
</html>
